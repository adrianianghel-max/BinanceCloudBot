name: Start Auto Scan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-auto-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable auto scan
        run: |
          python - << 'PY'
          import json
          from datetime import datetime, timezone

          path = "config_state.json"
          with open(path, "r", encoding="utf-8-sig") as f:
              data = json.load(f)

          data["auto_scan_enabled"] = True
          data["updated_at"] = datetime.now(timezone.utc).isoformat()

          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Commit state change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config_state.json
          git diff --cached --quiet || git commit -m "chore: start auto scan"
          git push

      - name: Send Telegram notification (start)
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS --max-time 20 --request POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=Binance scanner started. Auto scan is enabled. Triggered by: ${{ github.actor }}"
