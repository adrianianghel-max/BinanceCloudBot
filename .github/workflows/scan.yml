# GitHub Actions — Binance Gainer Scanner
# Rulează automat la fiecare 30 min + la fiecare push
name: Binance Gainer Scanner

on:
  schedule:
    # La fiecare 30 minute (la :00 și :30)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Poți rula manual din GitHub
  push:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node binance_scanner.js
